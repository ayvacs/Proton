site_name: Proton

repo_name: ayvacs/Proton
repo_url: https://github.com/ayvacs/Proton

copyright: Copyright &copy; 2023 ayvacs


nav:
    - Getting started:
        - Home: index.md
        - Compile a build: tutorial/build.md
        - Import Proton: tutorial/import.md
    - Connections: apply-connection.md
    - Special Properties: special-properties.md


theme:
    name: material
    favicon: assets/logo.png
    logo: assets/logo.png
    icon:
        repo: fontawesome/brands/github
    palette:
        scheme: slate
        primary: black
    features:
        - content.code.copy
        - content.code.select
        - navigation.instant
        - navigation.tabs

markdown_extensions:
    - pymdownx.highlight:
        anchor_linenums: true
        line_spans: __span
        pygments_lang_class: true
    - pymdownx.inlinehilite
    - pymdownx.snippets
    - pymdownx.superfences
    - admonition
    - pymdownx.details